name: gemhub
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  # FIXED: Set a realistic, modern Dart SDK range to support your top-tier packages
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Database & State Caching
  flutter_secure_storage: ^10.3.1
  sqflite_sqlcipher: ^3.0.1 
  shared_preferences: ^2.2.3
  path: ^1.8.3
  
  # Backend Integration (Supabase & OAuth)
  supabase_flutter: ^2.12.4
  google_sign_in: ^6.2.1
  flutter_svg: ^2.0.0

  # State Management & Routing
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.3
  
  # Networking
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  http: ^1.1.0
  flutter_dotenv: ^6.0.1

  # UI Components & Utilities
  cupertino_icons: ^1.0.8
  flutter_typeahead: ^5.2.0
  intl: ^0.20.2
  
  # Files, Images & Permissions
  file_picker: ^10.0.0
  image_picker: ^1.2.2
  open_file: ^3.3.2
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  
  # PDF & Printing
  syncfusion_flutter_pdfviewer: ^33.1.49
  pdf: ^3.12.0
  printing: ^5.14.3

  # Backup and Sync
  # archive: ^3.6.1
  flutter_archive: ^6.0.4
  share_plus: ^10.1.2
  flutter_file_dialog: ^3.0.3
  
  # Compression and Video Handling
  v_video_compressor: ^1.2.1
  flutter_image_compress: ^2.0.4
  video_player: ^2.11.1
  chewie: ^1.13.1
  fl_chart: ^1.2.0
  sqflite: ^2.4.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/gem_hub_icon.jpeg
    - assets/google-icon.svg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/gem_hub_icon.jpeg"
  remove_alpha_ios: trueflutter pub clean && flutter pub get